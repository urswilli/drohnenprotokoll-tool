name: Build & Push Docker Image

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # volle Historie für die Commit-Zählung

      - name: Versionsnummer ermitteln (fortlaufende Commit-Anzahl)
        id: version
        run: echo "count=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Changelog aus Git-Historie erzeugen (changelog.json)
        run: |
          python3 - <<'PY'
          import subprocess, json
          out = subprocess.check_output(
              ['git', 'log', '--no-merges', '--reverse',
               '--pretty=format:%h\x1f%s\x1f%cI']).decode('utf-8')
          entries = []
          for i, line in enumerate(out.splitlines()):
              if not line.strip():
                  continue
              parts = line.split('\x1f')
              if len(parts) != 3:
                  continue
              h, subject, iso = parts
              entries.append({'version': i + 1, 'hash': h,
                              'subject': subject, 'date': iso[:10]})
          entries.reverse()  # neueste zuerst
          with open('changelog.json', 'w', encoding='utf-8') as f:
              json.dump(entries, f, ensure_ascii=False, indent=2)
          print(f'changelog.json mit {len(entries)} Einträgen geschrieben')
          PY

      - name: Set up QEMU (für ARM64 / Pi 5)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.count }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
