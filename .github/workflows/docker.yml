name: Build & Push Docker Image

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # volle Historie für die Commit-Zählung

      - name: Versionsnummer ermitteln (fortlaufende Commit-Anzahl)
        id: version
        run: echo "count=$(git rev-list --count --no-merges HEAD)" >> "$GITHUB_OUTPUT"

      - name: Changelog aus Git-Historie erzeugen (changelog.json)
        run: |
          python3 - <<'PY'
          import subprocess, json
          COMMIT_TYPES = {'feat', 'fix', 'style', 'docs', 'refactor', 'chore', 'perf', 'ci', 'build', 'test'}
          out = subprocess.check_output(
              ['git', 'log', '--no-merges', '--reverse',
               '--pretty=format:%x1e%h%x1f%s%x1f%b%x1f%cI']).decode('utf-8', errors='replace')
          entries = []
          n = 0
          for record in out.split('\x1e'):
              record = record.strip()
              if not record:
                  continue
              last = record.rfind('\x1f')
              if last < 0:
                  continue
              iso = record[last + 1:].strip()
              rest = record[:last]
              parts = rest.split('\x1f', 2)
              if len(parts) < 2:
                  continue
              h = parts[0].strip()
              subject = parts[1].strip()
              body = parts[2].strip() if len(parts) > 2 else ''
              body_lines = [l for l in body.splitlines()
                            if not l.strip().lower().startswith('co-authored-by:')]
              body = '\n'.join(body_lines).strip()
              n += 1
              commit_type = ''
              if ':' in subject:
                  prefix = subject.split(':')[0].strip().lower()
                  if prefix in COMMIT_TYPES:
                      commit_type = prefix
                      subject = subject[len(prefix) + 1:].strip()
              entries.append({'version': n, 'hash': h,
                              'subject': subject, 'body': body,
                              'type': commit_type, 'date': iso[:10]})
          entries.reverse()  # neueste zuerst
          with open('changelog.json', 'w', encoding='utf-8') as f:
              json.dump(entries, f, ensure_ascii=False, indent=2)
          print(f'changelog.json mit {len(entries)} Einträgen geschrieben')
          PY

      - name: Set up QEMU (für ARM64 multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.count }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
