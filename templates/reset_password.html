{% extends "base.html" %}
{% block title %}Passwort zurücksetzen – Drohnenprotokoll SRG{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <div class="bg-srg rounded-circle d-inline-flex p-3 mb-2">
            <i class="bi bi-shield-lock text-white fs-3"></i>
          </div>
          <h4 class="fw-bold mb-0">Neues Passwort</h4>
          <p class="text-muted small">Wähle ein neues Passwort für dein Konto.</p>
        </div>
        <form method="post" action="{{ url_for('reset_password', token=token) }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Neues Passwort</label>
            <input type="password" name="password" class="form-control" minlength="6" autofocus required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Passwort wiederholen</label>
            <input type="password" name="password_confirm" class="form-control" minlength="6" required>
          </div>
          <button type="submit" class="btn btn-srg w-100 fw-semibold">
            <i class="bi bi-check2-circle me-1"></i> Passwort speichern
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
