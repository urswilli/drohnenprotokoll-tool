{% extends "base.html" %}
{% block title %}Passwort vergessen – Drohnenprotokoll SRG{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <div class="bg-srg rounded-circle d-inline-flex p-3 mb-2">
            <i class="bi bi-key text-white fs-3"></i>
          </div>
          <h4 class="fw-bold mb-0">Passwort vergessen</h4>
          <p class="text-muted small">Wir senden dir einen Link zum Zurücksetzen.</p>
        </div>
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">E-Mail</label>
            <input type="email" name="email" class="form-control" placeholder="vorname.nachname@srf.ch" autofocus required>
          </div>
          {% include '_turnstile.html' %}
          <button type="submit" class="btn btn-srg w-100 fw-semibold">
            <i class="bi bi-envelope me-1"></i> Link anfordern
          </button>
        </form>
        <div class="text-center mt-3 small">
          <a href="{{ url_for('login') }}" class="text-decoration-none">Zurück zum Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
