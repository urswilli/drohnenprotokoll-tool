services:
  app:
    image: ghcr.io/urswilli/drohnenprotokoll-tool:latest
    restart: unless-stopped
    ports:
      - "5050:5050"
    volumes:
      - /opt/drohnenprotokoll/data/drohnen.db:/app/drohnen.db
      - /opt/drohnenprotokoll/data/output:/app/output
    env_file: /opt/drohnenprotokoll/data/.env

# ─── Deployment auf dem Pi (via Portainer oder CLI) ──────────────────────────
#
# Einmalig vorbereiten:
#   sudo mkdir -p /opt/drohnenprotokoll/data
#   python3 -c "import secrets; print(secrets.token_hex(32))"
#   sudo nano /opt/drohnenprotokoll/data/.env
#     → SECRET_KEY=<generierter Wert>
#
# Via Portainer:
#   Stacks → Add Stack → Repository
#   URL: https://github.com/urswilli/drohnenprotokoll-tool
#   Compose path: docker-compose.yml
#
# Via CLI:
#   docker compose -f docker-compose.yml up -d
#
# Update:
#   docker compose pull && docker compose up -d
#   (oder in Portainer: Stack → Pull and redeploy)
#
# Daten (DB + PDFs) liegen in /opt/drohnenprotokoll/data/ → einfaches Backup
