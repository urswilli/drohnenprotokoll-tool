services:
  app:
    image: ghcr.io/urswilli/drohnenprotokoll-tool:latest
    restart: unless-stopped
    # Kein ports-Binding: App läuft nur im internen Netz, Zugriff ausschliesslich via cloudflared
    volumes:
      - ./data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATA_DIR=/app/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    cpus: 0.5
    networks:
      - app_net

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol http2 run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

# ─── Deployment via Portainer (VM docker-public, VLAN 50) ───────────────────
#
# Volume ./data ist relativ zum Portainer-Stack-Arbeitsverzeichnis:
#   /var/lib/portainer/compose/<stack-id>/data/
#
# Einmalig in VM docker-public (Verzeichnis anlegen + Berechtigungen setzen):
#   STACK_DIR=$(docker inspect <stack-container> | grep -o '/var/lib/portainer/compose/[0-9]*' | head -1)
#   sudo mkdir -p "$STACK_DIR/data"
#   sudo chown -R 1001:1001 "$STACK_DIR/data"
#
# Stacks → Add Stack → Repository
#   URL: https://github.com/urswilli/drohnenprotokoll-tool
#   Compose path: docker-compose.yml
#   → unter "Environment variables" eintragen:
#       SECRET_KEY              = <python3 -c "import secrets; print(secrets.token_hex(32))">
#       DATA_DIR                = /app/data
#       CLOUDFLARE_TUNNEL_TOKEN = <token aus Cloudflare Zero Trust Dashboard>
#
# Update: Stack → Pull and redeploy
